name: Backend CI

on:
  push:
    branches-ignore: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches-ignore: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Set up environment variables
      working-directory: ./backend
      run: |
        cp .env.example .env
        sed -i 's|DB_USER=.*|DB_USER=tppciuser|' .env
        sed -i 's|DB_PASSWORD=.*|DB_PASSWORD=tppci123|' .env
        sed -i 's|DB_NAME=.*|DB_NAME=themeparkplanner-ci_test|' .env
        sed -i 's|REDIS_URL=.*|REDIS_URL=redis://localhost:6379|' .env
        sed -i 's|DEBUG=.*|DEBUG=true|' .env

    - name: Run black code formatting check
      working-directory: ./backend
      run: |
        black --check --diff .

    - name: Run flake8 linting
      working-directory: ./backend
      run: |
        flake8 .

    - name: Run tests with coverage
      working-directory: ./backend
      run: |
        python -m pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
